<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MindCera AI Assistant</title>

<link rel="stylesheet"
href="assets/css/chat.css">

<link rel="stylesheet"
href="assets/css/theme.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>

<div class="chat-layout">


<!-- SIDEBAR -->

<aside class="conversation-sidebar">

    <div class="sidebar-top">

        <div class="logo">
            🧠 MindCera
        </div>

        <button
        class="new-chat-btn"
        onclick="createConversation()">

            + New Chat

        </button>

    </div>

    <div
    id="conversationList"
    class="conversation-list">

    </div>

</aside>

<!-- MAIN CHAT -->

<main class="chat-section">

    <!-- HEADER -->

    <div class="chat-header">

        <div>

            <h2>

                AI Wellness Assistant

            </h2>

            <span class="status">

                🟢 Online

            </span>

        </div>

        <div class="actions">

            <button
            onclick="toggleSpeech()">

                🔊 Voice

            </button>

            <button
            onclick="startVoice()">

                🎤 Speak

            </button>

        </div>

    </div>

    <!-- WELCOME PROMPTS -->

    <div class="prompt-container">

        <button onclick="quickPrompt('I feel stressed today')">

            😔 I feel stressed

        </button>

        <button onclick="quickPrompt('I feel anxious')">

            😟 I feel anxious

        </button>

        <button onclick="quickPrompt('I feel lonely')">

            💙 I feel lonely

        </button>

        <button onclick="quickPrompt('Motivate me')">

            ✨ Motivate me

        </button>

    </div>

    <!-- CHAT -->

    <div
    id="chatBox"
    class="chat-box">

        <div class="welcome-message">

            <h3>

                Hello 👋

            </h3>

            <p>

                I'm MindCera.
                Your AI wellness companion.

            </p>

        </div>

    </div>

    <!-- VOICE INDICATOR -->

    <div
    id="voiceIndicator"
    class="voice-indicator">

        🎤 Listening...

    </div>

    <!-- INPUT -->

    <div class="input-box">

        <input
        id="messageInput"
        type="text"
        placeholder="Share how you're feeling today...">

        <button onclick="sendMessage()">

            Send

        </button>

    </div>

</main>


</div>
<script>
window.onload = function(){

    initVoice();

};
</script>
<script src="assets/js/api.js"></script>

<script src="assets/js/chat.js"></script>

<script src="assets/js/voice.js"></script>

</body>

</html>
