<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Forgot Password | MindCera</title>

<link rel="stylesheet"
      href="assets/css/auth.css">


</head>

<body>

<div class="auth-wrapper">


<div class="auth-left">

    <div class="brand">
        🧠 MindCera
    </div>

    <h1>
        Recover Your Account
    </h1>

    <p>
        Enter your registered email address.
        We'll send a secure OTP to reset your password.
    </p>

</div>

<div class="auth-right">

    <div class="auth-card">

        <h2>Forgot Password</h2>

        <p>
            Enter your registered email
        </p>

        <input
            type="email"
            id="email"
            placeholder="Email Address">

        <button
            class="register-btn"
            onclick="sendOTP()">

            Send OTP

        </button>

        <div class="login-link">

            <a href="login.html">

                Back To Login

            </a>

        </div>

    </div>

</div>


</div>

<script src="assets/js/api.js"></script>

<script src="assets/js/auth.js"></script>

</body>

</html>
