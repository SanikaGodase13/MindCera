<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<title>Reset Password | MindCera</title>

<link rel="stylesheet"
      href="assets/css/auth.css">


</head>

<body>

<div class="auth-wrapper">


<div class="auth-left">

    <div class="brand">
        🧠 MindCera
    </div>

    <h1>
        Create New Password
    </h1>

    <p>
        Choose a strong password
        for your account.
    </p>

</div>

<div class="auth-right">

    <div class="auth-card">

        <h2>Reset Password</h2>

        <input
            type="email"
            id="email"
            placeholder="Email Address">

        <input
            type="text"
            id="otp"
            placeholder="OTP">

        <input
            type="password"
            id="newPassword"
            placeholder="New Password">

        <button
            class="register-btn"
            onclick="resetPassword()">

            Update Password

        </button>

    </div>

</div>


</div>

<script src="assets/js/api.js"></script>

<script src="assets/js/auth.js"></script>

</body>

</html>
